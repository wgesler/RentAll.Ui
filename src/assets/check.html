<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>QuickBooks Check Overlay</title>
<style>
  @page { size: 8.5in 11in; margin: 0; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Arial, Helvetica, sans-serif; color: #111; }
  .page { width: 8.5in; height: 11in; position: relative; }
  .field { position: absolute; white-space: nowrap; overflow: hidden; }
  .field-date { top: 0.72in; left: 6.15in; width: 1.35in; font-size: 11px; text-align: center; }
  .field-payee { top: 1.22in; left: 1.05in; width: 4.15in; font-size: 11px; }
  .field-amount { top: 1.18in; left: 6.45in; width: 1.05in; font-size: 12px; text-align: right; font-weight: bold; }
  .field-words { top: 1.66in; left: 0.15in; width: 6.55in; font-size: 11px; }
  .field-memo { top: 2.72in; left: 0.15in; width: 3.0in; font-size: 10px; }
  .stub-payee-vendor { top: 3.95in; left: 0.45in; width: 4.5in; font-size: 10px; }
  .stub-date-vendor { top: 3.95in; left: 5.95in; width: 1.2in; font-size: 10px; text-align: right; }
  .stub-table-vendor { top: 4.35in; left: 0.45in; width: 7.35in; font-size: 9.5px; }
  .stub-payee-company { top: 7.45in; left: 0.45in; width: 4.5in; font-size: 10px; }
  .stub-date-company { top: 7.45in; left: 5.95in; width: 1.2in; font-size: 10px; text-align: right; }
  .stub-table-company { top: 7.85in; left: 0.45in; width: 7.35in; font-size: 9.5px; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 2px 3px; height: 18px; vertical-align: bottom; }
  .num { text-align: right; }
  .total-row td { font-weight: bold; padding-top: 6px; }
  @media print { body { background: #fff; } .page { margin: 0; } }
</style>
</head>
<body>
<div class="page">
  <div class="field field-date">{{checkDate}}</div>
  <div class="field field-payee">{{payeeName}}</div>
  <div class="field field-amount">{{checkAmountFormatted}}</div>
  <div class="field field-words">{{amountInWords}}</div>
  <div class="field field-memo">{{memo}}</div>

  <div class="field stub-payee-vendor">{{payeeName}}</div>
  <div class="field stub-date-vendor">{{checkDate}}</div>
  <div class="field stub-table-vendor">
    <table>
      <tbody>{{vendorStubDetailRows}}</tbody>
    </table>
  </div>

  <div class="field stub-payee-company">{{payeeName}}</div>
  <div class="field stub-date-company">{{checkDate}}</div>
  <div class="field stub-table-company">
    <table>
      <tbody>{{companyStubDetailRows}}</tbody>
    </table>
  </div>
</div>
</body>
</html>
