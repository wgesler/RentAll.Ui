<div class="p-4">
  @if (isLoading) {
    <div class="page-loading-container">
      <mat-spinner [diameter]="40"></mat-spinner>
      <p>Loading listing...</p>
    </div>
  } @else if (property) {
    <app-property-listing
      [property]="property"
      [propertyId]="property.propertyId"
      [propertyCode]="property.propertyCode"
      [isReadOnly]="true"
      [hideRateCard]="true"
      [disablePhotoApiLoad]="true"
      [initialPhotos]="photos">
    </app-property-listing>
  } @else {
    <div>{{ errorMessage || 'Listing not found or link has expired.' }}</div>
  }
</div>
