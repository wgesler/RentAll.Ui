@if (!(isLoading$ | async)) {
  @if (embeddedInSettings) {
    <div class="mat list-layout-tabbed">
      <div class="tableDiv px-4">
        <app-data-table
          [data]="ticketsDisplay"
          [columns]="ticketsDisplayedColumns"
          [hasColumnIndex]="false"
          [hasFilter]="true"
          [hasToggleTop]="false"
          [hasActionsRowClick]="true"
          [hasActionsEdit]="true"
          [hasActionsDelete]="false"
          [itemsPerPage]="100"
          (editEvent)="goToTicket($event)"
          (rowClickEvent)="goToTicket($event)"/>
      </div>
    </div>
  } @else {
    <div class="flex content-card-wrap justify-center" fxLayout="row wrap">
      <section class="content-card">
        <div class="flex justify-between items-baseline bg-slate-200 rounded-t-lg px-8 py-4">
          <div class="flex items-baseline">
            <mat-icon mat-list-icon class="mr-5">confirmation_number</mat-icon>
            <h2 class="m-0">Tickets</h2>
          </div>
        </div>
        <mat-card>
          <div class="mat">
            <div class="tableDiv">
              <app-data-table
                [data]="ticketsDisplay"
                [columns]="ticketsDisplayedColumns"
                [hasColumnIndex]="false"
                [hasFilter]="true"
                [hasToggleTop]="false"
                [hasActionsRowClick]="true"
                [hasActionsEdit]="true"
                [hasActionsDelete]="false"
                [itemsPerPage]="100"
                (editEvent)="goToTicket($event)"
                (rowClickEvent)="goToTicket($event)"/>
            </div>
          </div>
        </mat-card>
      </section>
    </div>
  }
}
