<div class="ticket-receipt-dialog-wrap">
  <div class="ticket-receipt-dialog-header">
    <span class="ticket-receipt-dialog-title">
      <mat-icon class="flex-shrink-0">receipt</mat-icon>
      <span class="flex-shrink-0 text-xl font-medium">{{ dialogTitle }}</span>
    </span>
  </div>

  <mat-dialog-content class="ticket-receipt-dialog-content">
    <app-receipt
      #receiptDetail
      [property]="data.property"
      [receiptId]="data.receiptId ?? null"
      [ticketId]="data.ticketId"
      [shellContext]="'maintenance'"
      (savedEvent)="onReceiptSaved($event)">
      <div receipt-dialog-actions>
        <button mat-raised-button type="button" color="accent" (click)="closeDialog()" [disabled]="isSubmitting" class="text-nowrap flex-shrink-0">
          Cancel
        </button>
        <button mat-raised-button type="button" color="primary" (click)="saveReceipt()" [disabled]="isSaveDisabled" class="text-nowrap flex-shrink-0">
          <mat-icon>save</mat-icon>
          Save
        </button>
      </div>
    </app-receipt>
  </mat-dialog-content>
</div>
