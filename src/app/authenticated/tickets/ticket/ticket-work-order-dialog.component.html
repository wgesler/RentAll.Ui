<div class="ticket-work-order-dialog-wrap">
  <div class="ticket-work-order-dialog-header">
    <span class="ticket-work-order-dialog-title">
      <mat-icon class="flex-shrink-0">build</mat-icon>
      <span class="flex-shrink-0 text-xl font-medium">{{ dialogTitle }}</span>
    </span>
  </div>

  <mat-dialog-content class="ticket-work-order-dialog-content">
    <app-work-order
      #workOrderDetail
      [property]="data.property"
      [workOrderId]="data.workOrderId ?? null"
      [maintenanceId]="data.maintenanceId"
      [initialTitle]="data.initialTitle ?? null"
      [initialDescription]="data.initialDescription ?? null"
      [showBackButton]="false"
      [embeddedInMaintenance]="true"
      [navigateToPreviewOnSave]="false"
      (savedEvent)="onWorkOrderSaved($event)">
      <div work-order-dialog-actions>
        <button mat-raised-button type="button" color="accent" (click)="closeDialog()" [disabled]="isSubmitting" class="text-nowrap flex-shrink-0">
          Cancel
        </button>
        <button mat-raised-button type="button" color="primary" (click)="saveWorkOrder()" [disabled]="isSaveDisabled" class="text-nowrap flex-shrink-0">
          <mat-icon>save</mat-icon>
          Save
        </button>
      </div>
    </app-work-order>
  </mat-dialog-content>
</div>
