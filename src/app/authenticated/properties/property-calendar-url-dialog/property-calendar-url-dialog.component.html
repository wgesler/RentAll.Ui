<div class="flex flex-row flex-wrap">
  <div class="flex flex-1 justify-between items-center bg-slate-200 rounded-t-lg p-3">
    <span class="text-2xl items-center flex gap-2 ml-1">
      <mat-icon color="primary">calendar_month</mat-icon>
      Property Calendar URL
    </span>
    <button mat-raised-button mat-dialog-close type="button" color="accent" id="close-calendar-url-dialog" class="text-nowrap flex-shrink-0">
      Close
    </button>
  </div>

  <mat-dialog-content class="flex-shrink-0 w-full p-6">
    <p class="mb-3">Use this URL to subscribe to the calendar for <strong>{{ data.propertyCode }}</strong>.</p>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Calendar URL</mat-label>
      <input matInput [value]="resolvedSubscriptionUrl" readonly>
      <button
        mat-icon-button
        matSuffix
        type="button"
        aria-label="Copy calendar URL"
        matTooltip="Copy URL"
        (click)="copyUrl()">
        <mat-icon>content_copy</mat-icon>
      </button>
    </mat-form-field>

    @if (responseKeyValuePairs.length > 0) {
      <div class="calendar-response-pairs mt-3">
        <h4 class="mb-2">API Response</h4>
        @for (pair of responseKeyValuePairs; track pair.key) {
          <div class="mb-1">
            <strong>{{ pair.key }}:</strong> {{ pair.value }}
          </div>
        }
      </div>
    }
  </mat-dialog-content>

</div>
