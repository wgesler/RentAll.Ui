<div class="tableDiv">
  <app-data-table
    [data]="inspectionsDisplay"
    [columns]="inspectionDisplayedColumns"
    [hasColumnIndex]="false"
    [hasFilter]="true"
    [hasActionsRowClick]="true"
    [hasActionsView]="true"
    [hasActionsDelete]="true"
    [hasToggleTop]="false"
    [hasButtonTop]="false"
    [itemsPerPage]="100"
    (rowClickEvent)="openInspection($event)"
    (viewEvent)="viewDocument($event)"
    (deleteEvent)="deleteInspection($event)" />
</div>
