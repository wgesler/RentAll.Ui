@if (isLoading) {
  <div class="loading-container">
    <mat-spinner [diameter]="40"></mat-spinner>
    <p>Loading receipts...</p>
  </div>
} @else if (isServiceError) {
  <p class="empty-msg">Unable to load receipts.</p>
} @else {
  <div class="mat list-layout-standard dbg-band-main">
    <div class="tableDiv">
      <app-data-table
        [data]="receiptsDisplay"
        [columns]="receiptDisplayedColumns"
        noDataMessage="No unaccounted receipts"
        [hasColumnIndex]="false"
        [hasFilter]="true"
        [hasToggleTop]="false"
        [hasButtonTop]="false"
        [hasActionsRowClick]="true"
        [hasActionsEdit]="true"
        [hasActionsDelete]="true"
        [deleteConfirmTitle]="'Delete Receipt'"
        [deleteConfirmMessage]="'Are you sure you want to delete this receipt?'"
        [itemsPerPage]="100"
        (editEvent)="goToReceipt($event)"
        (rowClickEvent)="goToReceipt($event)"
        (receiptClickEvent)="openReceiptDialog($event)"
        (deleteEvent)="deleteReceipt($event)">
        <div dataTableFilterActions>
          <div class="table-filter-actions-group form-titlebar-actions-wrap uniform-gap">
            <mat-slide-toggle [checked]="showInactive" color="primary" (change)="toggleInactive()">
              InActive
            </mat-slide-toggle>
            <button mat-raised-button type="button" color="primary" id="add-receipt-button" class="text-nowrap flex-shrink-0" (click)="addReceipt()">
              <mat-icon>add</mat-icon>
              Add
            </button>
          </div>
        </div>
      </app-data-table>
    </div>
  </div>
}
