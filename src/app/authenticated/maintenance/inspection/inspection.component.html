@if (shouldShowBackButton) {
  <div class="flex justify-end mt-4 mb-4">
    <button mat-raised-button type="button" color="accent" (click)="back()">
      <mat-icon>close</mat-icon>
      Close
    </button>
  </div>
}

@if (isLoading$ | async) {
  <div class="loading-wrap">
    <mat-spinner [diameter]="30"></mat-spinner>
    <span>Loading inspection...</span>
  </div>
} @else if (isServiceError) {
  <p class="empty-msg">Unable to load inspection.</p>
} @else if (inspectionChecklistJson) {
  <app-inspection-checklist
    [property]="property"
    [templateJson]="checklistJson"
    [answersJson]="inspectionChecklistJson"
    [checklistType]="'inspection'"
    [mode]="'readonly'" />
} @else {
  <p class="empty-msg">No inspection checklist found for this property.</p>
}
