@if (isLoading) {
  <div class="maintenance-item-loading">
    <mat-spinner [diameter]="28"></mat-spinner>
    <span>Loading maintenance items...</span>
  </div>
} @else {
  <div class="maintenance-item-actions">
    <button mat-raised-button color="accent" type="button" class="text-nowrap flex-shrink-0" (click)="addRow()">
      <mat-icon>add</mat-icon>
      Add
    </button>
    @if (canSave) {
      <button mat-raised-button color="primary" type="button" (click)="onSaveChanges()" [disabled]="isSaving">
        <mat-icon>save</mat-icon>
        Save
      </button>
    }
  </div>

  <div class="maintenance-item-lines-wrap overflow-x-auto">
    <table class="line-items-table maintenance-item-lines-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Last Serviced</th>
          <th>Months</th>
          <th>Notes</th>
          <th class="actions-column"></th>
        </tr>
      </thead>
      <tbody>
        @if (!rows || rows.length === 0) {
          <tr>
            <td class="maintenance-item-empty" colspan="5">No maintenance items found for this property.</td>
          </tr>
        } @else {
          @for (row of rows; track trackByRowId($index, row)) {
            <tr>
              <td>
                <input
                  type="text"
                  class="editable-input name-input"
                  [class.input-invalid]="!row.name?.trim()"
                  [(ngModel)]="row.name"
                  [ngModelOptions]="{ standalone: true }"
                  [name]="'maintenance-item-name-' + row.rowId" />
              </td>
              <td>
                <input
                  type="date"
                  class="editable-input date-input"
                  [class.has-date]="!!row.lastServicedOn"
                  [class.input-invalid]="!row.lastServicedOn"
                  [(ngModel)]="row.lastServicedOn"
                  [ngModelOptions]="{ standalone: true }"
                  [name]="'maintenance-item-last-serviced-' + row.rowId" />
              </td>
              <td>
                <input
                  type="text"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  class="editable-input months-input"
                  [class.input-invalid]="row.monthsBetweenService === null || row.monthsBetweenService === undefined"
                  [ngModel]="row.monthsBetweenService ?? ''"
                  (ngModelChange)="onMonthsBetweenServiceInput(row, $event)"
                  [ngModelOptions]="{ standalone: true }"
                  [name]="'maintenance-item-months-' + row.rowId" />
              </td>
              <td>
                <textarea
                  class="editable-input notes-input"
                  [(ngModel)]="row.notes"
                  [ngModelOptions]="{ standalone: true }"
                  [name]="'maintenance-item-notes-' + row.rowId"></textarea>
              </td>
              <td class="actions-column">
                <button mat-icon-button type="button" class="delete-row-btn" (click)="removeRow(row)" [disabled]="isSaving">
                  <mat-icon>close</mat-icon>
                </button>
              </td>
            </tr>
          }
        }
      </tbody>
    </table>
  </div>
}
