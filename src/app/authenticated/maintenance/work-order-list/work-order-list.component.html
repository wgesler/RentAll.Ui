@if (isLoading) {
  <div class="loading-container">
    <mat-spinner [diameter]="40"></mat-spinner>
    <p>Loading work orders...</p>
  </div>
} @else if (isServiceError) {
  <p class="empty-msg">Unable to load work orders.</p>
} @else {
  <div class="mat list-layout-standard dbg-band-main">
    <div class="tableDiv">
      <app-data-table
        [data]="workOrdersDisplay"
        [columns]="workOrderDisplayedColumns"
        [hasColumnIndex]="false"
        [hasFilter]="true"
        [hasToggleTop]="false"
        [hasButtonTop]="false"
        [hasActionsRowClick]="true"
        [hasActionsView]="true"
        [hasActionsEdit]="true"
        [hasActionsDelete]="true"
        [deleteConfirmTitle]="'Delete Work Order'"
        [deleteConfirmMessage]="'Are you sure you want to delete this work order?'"
        [itemsPerPage]="100"
        (viewEvent)="viewWorkOrder($event)"
        (editEvent)="goToWorkOrder($event)"
        (rowClickEvent)="goToWorkOrder($event)"
        (deleteEvent)="deleteWorkOrder($event)">
        <div dataTableFilterActions>
          <div class="table-filter-actions-group form-titlebar-actions-wrap uniform-gap">
            <mat-slide-toggle [checked]="showInactive" color="primary" (change)="toggleInactive()">
              InActive
            </mat-slide-toggle>
            <button mat-raised-button type="button" color="primary" id="add-work-order-button" class="text-nowrap flex-shrink-0" (click)="addWorkOrder()">
              <mat-icon>add</mat-icon>
              Add
            </button>
          </div>
        </div>
      </app-data-table>
    </div>
  </div>
}
