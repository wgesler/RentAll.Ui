<ng-template #documentPreviewContent>
  <form class="document-preview-form">
    <div class="document-preview-editor">
      <div class="document-preview-actions form-titlebar-actions-wrap uniform-gap">
        <button mat-raised-button type="button" color="accent" (click)="onPrint()" [disabled]="!previewIframeHtml">
          <mat-icon>print</mat-icon>
          Print
        </button>
        <button mat-raised-button type="button" color="accent" (click)="onEmail()" [disabled]="!previewIframeHtml">
          <mat-icon>email</mat-icon>
          Email
        </button>
        <button mat-raised-button type="button" color="accent" (click)="onDownload()" [disabled]="!previewIframeHtml || isDownloading">
          <mat-icon>download</mat-icon>
          {{ isDownloading ? 'Downloading...' : 'Download' }}
        </button>
        <button mat-raised-button type="button" color="primary" (click)="saveWorkOrder()" [disabled]="!previewIframeHtml || isSubmitting">
          <mat-icon>save</mat-icon>
          {{ isSubmitting ? 'Saving...' : 'Document' }}
        </button>
      </div>
      @if (previewIframeHtml) {
        <div class="document-preview-frame">
          <iframe
            [srcdoc]="safePreviewIframeHtml"
            class="document-preview-iframe preview-iframe"
            [attr.key]="iframeKey"
            (load)="injectStylesIntoIframe()"
            frameborder="0">
          </iframe>
        </div>
      } @else {
        <div class="document-preview-empty">No preview is available for this work order.</div>
      }
    </div>
  </form>
</ng-template>

@if (!isPageReady) {
  @if (shellMode) {
    <div class="document-preview-shell">
      <div class="document-preview-loading">
        <mat-spinner [diameter]="40"></mat-spinner>
        <p>Loading work order preview...</p>
      </div>
    </div>
  } @else {
    <div class="flex content-card-wrap justify-center">
      <section class="content-card">
        <div class="flex justify-between items-center gap-3 bg-slate-300 rounded-t-lg py-0 pl-8 pr-4">
          <span class="flex flex-column items-center gap-3 py-4">
            <mat-icon class="flex-shrink-0">build</mat-icon>
            <span class="flex-shrink-0 text-xl font-medium">Work Order</span>
          </span>
          <div class="flex gap-2">
            <button mat-raised-button type="button" color="accent" id="back-button" (click)="goBack()" class="back-button text-nowrap flex-shrink-0">
              <mat-icon>arrow_back</mat-icon>
              Back
            </button>
          </div>
        </div>
        <mat-card>
          <div class="document-preview-loading">
            <mat-spinner [diameter]="40"></mat-spinner>
            <p>Loading work order preview...</p>
          </div>
        </mat-card>
      </section>
    </div>
  }
} @else if (shellMode) {
  <div class="document-preview-shell">
    <ng-container *ngTemplateOutlet="documentPreviewContent"></ng-container>
  </div>
} @else {
  <div class="flex content-card-wrap justify-center">
    <section class="content-card">
      <div class="flex justify-between items-center gap-3 bg-slate-300 rounded-t-lg py-0 pl-8 pr-4">
        <span class="flex flex-column items-center gap-3 py-4">
          <mat-icon class="flex-shrink-0">build</mat-icon>
          <span class="flex-shrink-0 text-xl font-medium">Work Order</span>
        </span>
        <div class="flex gap-2">
          <button mat-raised-button type="button" color="accent" id="back-button" (click)="goBack()" class="back-button text-nowrap flex-shrink-0">
            <mat-icon>arrow_back</mat-icon>
            Back
          </button>
        </div>
      </div>
      <mat-card>
        <div class="mat">
          <ng-container *ngTemplateOutlet="documentPreviewContent"></ng-container>
        </div>
      </mat-card>
    </section>
  </div>
}
