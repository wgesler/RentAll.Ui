@if (!property && !isServiceError) {
  <div class="loading-container">
    <mat-spinner [diameter]="40"></mat-spinner>
    <p>Loading property...</p>
  </div>
} @else if (isServiceError) {
  <div class="loading-container">
    <p>Unable to load property.</p>
  </div>
} @else {
  <div class="flex content-card-wrap justify-center">
    <section class="content-card">
      <div class="flex justify-between items-center gap-3 bg-slate-300 rounded-t-lg py-0 pl-8 pr-4">
        <span class="flex flex-column items-center gap-3 py-4">
          <mat-icon class="flex-shrink-0">build</mat-icon>
          <span class="flex-shrink-0 text-xl font-medium">
            Maintenance
          </span>
        </span>
        <div class="flex gap-2">
          <button mat-raised-button type="button" color="accent" id="back-button" (click)="back()"
            class="scale-90 text-nowrap flex-shrink-0">
            <mat-icon>arrow_back</mat-icon>
            Back
          </button>
        </div>
      </div>

      <mat-card>
        <mat-tab-group [selectedIndex]="selectedTabIndex" class="property-tabs" (selectedTabChange)="onTabChange($event)">
          <mat-tab label="Inspection">
            <app-inspection-checklist
              [property]="property"
              [checklistType]="'inspection'" />
          </mat-tab>
          <mat-tab label="Inventory">
            <app-inspection-checklist
              [property]="property"
              [checklistType]="'inventory'" />
          </mat-tab>
          <mat-tab label="Work Orders">
            <app-work-order-list [property]="property" />
          </mat-tab>
          <mat-tab label="Contractors">
            <app-contractor-list [propertyId]="property?.propertyId || null" />
          </mat-tab>
          <mat-tab label="History">
            <app-history [property]="property" />
          </mat-tab>
        </mat-tab-group>
      </mat-card>
    </section>
  </div>
}
