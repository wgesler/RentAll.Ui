@if (isPageLoading) {
  <div class="loading-container">
    <mat-spinner [diameter]="32"></mat-spinner>
    <p>Loading maintenance...</p>
  </div>
} @else {
<section class="maintenance-page">
  <div class="info-form form-standard-top-padding">
  <form [formGroup]="form" class="maintenance-top-fields form-standard-grid form-hide-error-text">
    <div class="maintenance-top-actions">
      <button mat-raised-button color="primary" type="button" (click)="onSave()" [disabled]="isSaving || form.invalid">
        <mat-icon>save</mat-icon>
        Save
      </button>
    </div>
    <div class="maintenance-form-row form-standard-grid">
      <mat-form-field appearance="outline" class="maintenance-field-full">
        <mat-label>Notes</mat-label>
        <textarea matInput rows="2" formControlName="notes"></textarea>
      </mat-form-field>
    </div>
  </form>
  <mat-accordion class="maintenance-accordion" multi="true">
    <mat-expansion-panel [expanded]="true">
      <mat-expansion-panel-header>
        <mat-panel-title>Maintenance</mat-panel-title>
      </mat-expansion-panel-header>
      <app-maintenance-item-list
        [maintenanceItems]="maintenanceItems"
        [isLoading]="isPageLoading"
        [isSaving]="isSavingMaintenanceItems"
        [property]="property"
        (deleteExisting)="onMaintenanceItemDelete($event)"
        (saveChanges)="onMaintenanceItemSaveChanges($event)" />
    </mat-expansion-panel>

    <mat-expansion-panel [expanded]="true">
      <mat-expansion-panel-header>
        <mat-panel-title>Appliances</mat-panel-title>
      </mat-expansion-panel-header>
      <app-maintenance-appliance-list
        [appliances]="appliances"
        [isLoading]="isPageLoading"
        [isSaving]="isSavingAppliances"
        [property]="property"
        (deleteExisting)="onApplianceDelete($event)"
        (saveChanges)="onApplianceSaveChanges($event)" />
    </mat-expansion-panel>

    <mat-expansion-panel [expanded]="true">
      <mat-expansion-panel-header>
        <mat-panel-title>Utilities</mat-panel-title>
      </mat-expansion-panel-header>
      <app-maintenance-utility-list
        [utilities]="utilities"
        [isLoading]="isPageLoading"
        [isSaving]="isSavingUtilities"
        [property]="property"
        (deleteExisting)="onUtilityDelete($event)"
        (saveChanges)="onUtilitySaveChanges($event)" />
    </mat-expansion-panel>
  </mat-accordion>
  </div>
</section>
}
