@if (isLoading$ | async) {
  <div class="loading-container">
    <mat-spinner [diameter]="40"></mat-spinner>
    <p>Loading property and maintenance...</p>
  </div>
} @else if (isServiceError) {
  <div class="loading-container">
    <p>Unable to load property.</p>
  </div>
} @else {
  <div class="flex content-card-wrap justify-center">
    <section class="content-card">
      <div class="flex justify-between items-center gap-3 bg-slate-300 rounded-t-lg py-0 pl-8 pr-4">
        <span class="flex flex-column items-center gap-3 py-4">
          <mat-icon class="flex-shrink-0">build</mat-icon>
          <span class="flex-shrink-0 text-xl font-medium">
            Maintenance
          </span>
        </span>
        <div class="flex gap-2">
          <button mat-raised-button type="button" color="accent" id="back-button" (click)="back()"
            class="scale-90 text-nowrap flex-shrink-0">
            <mat-icon>arrow_back</mat-icon>
            Back
          </button>
        </div>
      </div>

      <mat-card>
        <mat-tab-group [selectedIndex]="selectedTabIndex" class="property-tabs" (selectedTabChange)="onTabChange($event)">
          <mat-tab label="Inspection">
            @if (property && maintenanceRecord) {
              <app-checklist
                [property]="property"
                [templateJson]="inspectionTemplateJson"
                [maintenanceRecord]="maintenanceRecord"
                [checklistType]="'inspection'"
                [mode]="templateMode ? 'template' : 'answer'"
                [isSaving]="isSavingTemplate"
                (templateSaved)="onSaveTemplate($event, 'inspection')" />
            }
          </mat-tab>
          <mat-tab label="Inventory">
            @if (property && maintenanceRecord) {
              <app-checklist
                [property]="property"
                [templateJson]="inventoryTemplateJson"
                [maintenanceRecord]="maintenanceRecord"
                [checklistType]="'inventory'"
                [mode]="templateMode ? 'template' : 'answer'"
                [isSaving]="isSavingTemplate"
                (templateSaved)="onSaveTemplate($event, 'inventory')" />
            }
          </mat-tab>
          <mat-tab label="Work Orders">
            <app-work-order-list [property]="property" />
          </mat-tab>
          <mat-tab label="Receipts">
            <app-receipts-list [property]="property" />
          </mat-tab>
          <mat-tab label="Vendors">
            @if (showVendorForm) {
              <app-contact [id]="formContactId ?? 'new'" [copyFrom]="formCopyFrom" [entityTypeId]="formEntityTypeId" (closed)="onVendorFormClosed($event)" />
            } @else {
              <app-contact-list [entityTypeId]="EntityType.Vendor" [showCompanyColumn]="true" (openContact)="onOpenVendor($event)" />
            }
          </mat-tab>
          <mat-tab label="History">
            <app-history [property]="property" />
          </mat-tab>
        </mat-tab-group>
      </mat-card>
    </section>
  </div>
}
