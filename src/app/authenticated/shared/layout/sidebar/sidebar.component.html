<mat-sidenav-container [autosize]="true">
  <mat-sidenav #sideNav
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
    [style.width.px]="(isHandset$ | async) ? collapsedSidebarWidth : desktopSidebarWidth"
    [class.sidenav-collapsed]="!isExpanded || (isHandset$ | async)">

    @for (navItem of navItems; track navItem; let i = $index) {
      <a mat-list-item [routerLink]="navItem.url"
        [ngClass]="{'mat-list-item-closed': !isExpanded || (isHandset$ | async)}"
        [disableRipple]="true"
        [matTooltip]="(!isExpanded || (isHandset$ | async)) ? navItem.displayName : ''" matTooltipPosition="after"
        [matTooltipClass]="'sidenav-tooltip'"
        [id]="'sidenav-list-item-' + i"
        (click)="sideNav.mode === 'over' ? sideNav.toggle() : ''">
        <div class="mat-list-item-content-open" [ngClass]="{'mat-list-item-content-closed': !isExpanded || (isHandset$ | async)}" routerLinkActive="active-list-item">
          @if (navItem.url === 'tickets' && hasAssignedTicketBadge) {
            <span class="sidebar-ticket-badge-dot" aria-hidden="true"></span>
          }
          @if (navItem.icon === 'dashboard') {
            <img src="assets/images/icons/dashboard.svg" alt="" class="sidebar-svg-icon" aria-hidden="true" />
          } @else {
          <mat-icon>{{navItem.icon}}</mat-icon>
          }
          @if (isExpanded && (isHandset$ | async) === false) {
            <span>{{navItem.displayName}}</span>
          }
        </div>
      </a>
    }

  </mat-sidenav>
  <mat-sidenav-content>
    <router-outlet/>
  </mat-sidenav-content>
</mat-sidenav-container>
