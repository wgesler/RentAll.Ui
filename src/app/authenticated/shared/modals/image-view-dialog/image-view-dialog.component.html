<div class="image-view-dialog">
  <div class="image-view-dialog-header flex justify-between items-center bg-slate-200 rounded-t-lg p-3">
    @if (data.title) {
      <span class="text-xl">{{ data.title }}</span>
    }
    <button
      mat-raised-button
      color="primary"
      type="button"
      (click)="close()">
      Close
    </button>
  </div>
  <mat-dialog-content class="image-view-dialog-content">
    @if (isPdf) {
      <div class="image-view-pdf-wrapper">
        @if (canNavigate) {
          <button mat-icon-button type="button" class="image-nav-btn image-nav-btn--left" (click)="goPrevious()" aria-label="Previous image">
            <mat-icon>chevron_left</mat-icon>
          </button>
          <button mat-icon-button type="button" class="image-nav-btn image-nav-btn--right" (click)="goNext()" aria-label="Next image">
            <mat-icon>chevron_right</mat-icon>
          </button>
        }
        @if (pdfViewerSrc) {
          <iframe
            [src]="pdfViewerSrc"
            title="PDF preview"
            class="image-view-pdf-frame">
          </iframe>
        } @else {
          <div class="image-view-pdf-loading">
            <span class="text-sm">Unable to render PDF.</span>
          </div>
        }
      </div>
      <div class="image-view-zoom-controls">
        <button mat-icon-button type="button" (click)="zoomOut()" [disabled]="zoomScale <= minZoom" aria-label="Zoom out">
          <mat-icon>zoom_out</mat-icon>
        </button>
        <span class="image-view-zoom-label">{{ (zoomScale * 100) | number:'1.0-0' }}%</span>
        <button mat-icon-button type="button" (click)="zoomIn()" [disabled]="zoomScale >= maxZoom" aria-label="Zoom in">
          <mat-icon>zoom_in</mat-icon>
        </button>
      </div>
    } @else {
      <div class="image-view-zoom-wrapper">
        @if (canNavigate) {
          <button mat-icon-button type="button" class="image-nav-btn image-nav-btn--left" (click)="goPrevious()" aria-label="Previous image">
            <mat-icon>chevron_left</mat-icon>
          </button>
          <button mat-icon-button type="button" class="image-nav-btn image-nav-btn--right" (click)="goNext()" aria-label="Next image">
            <mat-icon>chevron_right</mat-icon>
          </button>
        }
        <img [src]="currentImageSrc" alt="Image" class="image-view-img" [style.transform]="'scale(' + zoomScale + ')'" />
      </div>
      <div class="image-view-zoom-controls">
        <button mat-icon-button type="button" (click)="zoomOut()" [disabled]="zoomScale <= minZoom" aria-label="Zoom out">
          <mat-icon>zoom_out</mat-icon>
        </button>
        <span class="image-view-zoom-label">{{ (zoomScale * 100) | number:'1.0-0' }}%</span>
        <button mat-icon-button type="button" (click)="zoomIn()" [disabled]="zoomScale >= maxZoom" aria-label="Zoom in">
          <mat-icon>zoom_in</mat-icon>
        </button>
      </div>
    }
  </mat-dialog-content>
</div>
