<div class="password-check-dialog">
  <div class="password-check-dialog-header">
    <span class="password-check-dialog-title">{{ title }}</span>
    <button mat-mini-fab mat-dialog-close type="button" color="none" class="password-check-dialog-close" [disabled]="isSubmitting">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="password-check-dialog-content">
    @if (data.message) {
      <p class="password-check-dialog-message">{{ data.message }}</p>
    }

    <form [formGroup]="form" class="password-check-dialog-form" (ngSubmit)="onConfirm()">
      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password" />
        @if (data.hint) {
          <mat-hint>{{ data.hint }}</mat-hint>
        }
      </mat-form-field>
    </form>
  </mat-dialog-content>

  <mat-divider></mat-divider>
  <div class="password-check-dialog-actions">
    <button mat-raised-button type="button" color="accent" (click)="onCancel()" [disabled]="isSubmitting">Cancel</button>
    <button mat-raised-button type="button" color="primary" (click)="onConfirm()" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Checking...' : confirmLabel }}
    </button>
  </div>
</div>
