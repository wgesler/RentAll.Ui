<div class="flex content-card-wrap justify-center">
  <section class="content-card">
    <div class="flex justify-between items-center gap-3 bg-slate-300 rounded-t-lg py-0 pl-8 pr-4">
      <span class="flex flex-column items-center gap-3 py-4">
        <mat-icon class="flex-shrink-0">contacts</mat-icon>
        <span class="flex-shrink-0 text-xl font-medium">Contacts</span>
      </span>
    </div>
    <mat-card>
      <mat-tab-group [selectedIndex]="selectedTabIndex" class="contacts-tabs" (selectedTabChange)="onTabChange($event)">
        <mat-tab label="Tenants">
          @if (showContactForm && formTabIndex === 0) {
            <app-contact [id]="formContactId ?? 'new'" [copyFrom]="formCopyFrom" [entityTypeId]="formEntityTypeId" (closed)="onContactClosed($event)" />
          } @else {
            <app-contact-list [tabIndex]="0" [entityTypeId]="EntityType.Tenant" [showCompanyColumn]="true" [officeId]="selectedOfficeId" (officeIdChange)="onOfficeIdChange($event)" (openContact)="onOpenContact($event)" />
          }
        </mat-tab>
        <mat-tab label="Owners">
          @if (showContactForm && formTabIndex === 1) {
            <app-contact [id]="formContactId ?? 'new'" [copyFrom]="formCopyFrom" [entityTypeId]="formEntityTypeId" (closed)="onContactClosed($event)" />
          } @else {
            <app-contact-list [tabIndex]="1" [entityTypeId]="EntityType.Owner" [officeId]="selectedOfficeId" (officeIdChange)="onOfficeIdChange($event)" (openContact)="onOpenContact($event)" />
          }
        </mat-tab>
        <mat-tab label="Companies">
          @if (showContactForm && formTabIndex === 2) {
            <app-contact [id]="formContactId ?? 'new'" [copyFrom]="formCopyFrom" [entityTypeId]="formEntityTypeId" (closed)="onContactClosed($event)" />
          } @else {
            <app-contact-list [tabIndex]="2" [entityTypeId]="EntityType.Company" [showCompanyColumn]="true" [officeId]="selectedOfficeId" (officeIdChange)="onOfficeIdChange($event)" (openContact)="onOpenContact($event)" />
          }
        </mat-tab>
        <mat-tab label="Vendors">
          @if (showContactForm && formTabIndex === 3) {
            <app-contact [id]="formContactId ?? 'new'" [copyFrom]="formCopyFrom" [entityTypeId]="formEntityTypeId" (closed)="onContactClosed($event)" />
          } @else {
            <app-contact-list [tabIndex]="3" [entityTypeId]="EntityType.Vendor" [showCompanyColumn]="true" [officeId]="selectedOfficeId" (officeIdChange)="onOfficeIdChange($event)" (openContact)="onOpenContact($event)" />
          }
        </mat-tab>
      </mat-tab-group>
    </mat-card>
  </section>
</div>
