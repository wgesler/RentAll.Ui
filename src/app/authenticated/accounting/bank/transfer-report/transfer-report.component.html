@if (!isPageReady) {
  <div class="loading-container">
    <mat-spinner [diameter]="40"></mat-spinner>
    <p>Loading transfer report...</p>
  </div>
} @else if (isServiceError) {
  <div class="general-ledger-empty-state">
    <p>{{ noActivityMessage }}</p>
  </div>
} @else if (rowsDisplay.length === 0) {
  <div class="general-ledger-empty-state">
    <p>{{ noActivityMessage }}</p>
  </div>
} @else {
  <div class="mat list-layout-standard dbg-band-main transfer-report-flat">
    <div class="tableDiv">
      <app-data-table
        [data]="rowsDisplay"
        [columns]="displayedColumns"
        [hasColumnIndex]="true"
        [hasFilter]="true"
        [hasToggleTop]="false"
        [hasButtonTop]="false"
        [hasActionsSelect]="false"
        [hasActionsRowClick]="false"
        [itemsPerPage]="25"
        [totalsRow]="totalsRow"
        [totalsRowAlerts]="totalsRowAlerts">
        <div dataTableFilterActions>
          <div class="table-filter-actions-group form-titlebar-actions-wrap uniform-gap">
            <button
              mat-raised-button
              type="button"
              color="primary"
              class="text-nowrap flex-shrink-0 whitespace-nowrap items-center flex gap-1"
              (click)="postTransferReport()"
              [disabled]="!canPostTransferReport || isPostingTransferReport">
              @if (isPostingTransferReport) {
                <mat-spinner diameter="15" />
              } @else {
                <mat-icon class="text-base">publish</mat-icon>
              }
              <span>{{ isPostingTransferReport ? 'Posting...' : 'Post' }}</span>
            </button>
          </div>
        </div>
      </app-data-table>
    </div>
  </div>
}
