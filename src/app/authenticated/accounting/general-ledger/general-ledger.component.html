@if (isPageReady) {
  @if (isServiceError || !journalEntry) {
    <div class="general-ledger-empty-state">
      <p>Unable to load journal entry details.</p>
    </div>
  } @else {
    <form [formGroup]="form" class="info-form mb-8 form-standard-top-padding general-ledger-form" (ngSubmit)="saveJournalEntry()">
      <div class="general-ledger-posted-row">
        <mat-checkbox
          formControlName="isPosted"
          color="primary"
          class="text-nowrap">
          Posted
        </mat-checkbox>
        <button
          mat-raised-button
          type="submit"
          color="primary"
          class="text-nowrap flex-shrink-0"
          [disabled]="!canSave || isSaving">
          <mat-icon>save</mat-icon>
          Save
        </button>
      </div>

      <div class="general-ledger-header-row">
        <mat-form-field appearance="outline" class="general-ledger-field general-ledger-field-entry w-full">
          <mat-label>Entry No</mat-label>
          <input matInput [value]="journalEntry.journalEntryCode || ''" readonly disabled class="readonly-field">
        </mat-form-field>

        <mat-form-field appearance="outline" class="general-ledger-field w-full">
          <mat-label>Source Type</mat-label>
          <input matInput [value]="getSourceTypeLabel()" readonly disabled class="readonly-field">
        </mat-form-field>

        <mat-form-field appearance="outline" class="general-ledger-field w-full">
          <mat-label>Transaction Date</mat-label>
          <input matInput [value]="formatter.formatDateString(journalEntry.transactionDate)" readonly disabled class="readonly-field">
        </mat-form-field>

        <mat-form-field appearance="outline" class="general-ledger-field w-full">
          <mat-label>Posting Date</mat-label>
          <input matInput [matDatepicker]="postingDatePicker" formControlName="postingDate">
          <mat-datepicker-toggle matIconSuffix [for]="postingDatePicker"></mat-datepicker-toggle>
          <mat-datepicker #postingDatePicker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="general-ledger-field general-ledger-field-memo w-full">
          <mat-label>Memo</mat-label>
          <input matInput formControlName="memo" maxlength="2500">
        </mat-form-field>
      </div>

      <div class="general-ledger-lines-table">
        <app-data-table
          [data]="lineRows"
          [columns]="lineDisplayedColumns"
          [hasColumnIndex]="false"
          [hasFilter]="false"
          [hasToggleTop]="false"
          [itemsPerPage]="100">
        </app-data-table>
      </div>

      <div class="general-ledger-totals-row">
        <mat-form-field
          appearance="outline"
          subscriptSizing="dynamic"
          class="general-ledger-field general-ledger-total-debit general-ledger-total-display-field w-full"
          (mousedown)="$event.preventDefault()">
          <mat-label>Total Debit</mat-label>
          <input
            matInput
            [value]="getTotalDebitDisplay()"
            readonly
            tabindex="-1"
            (focus)="$any($event.target).blur()">
        </mat-form-field>

        <mat-form-field
          appearance="outline"
          subscriptSizing="dynamic"
          class="general-ledger-field general-ledger-total-credit general-ledger-total-display-field w-full"
          (mousedown)="$event.preventDefault()">
          <mat-label>Total Credit</mat-label>
          <input
            matInput
            [value]="getTotalCreditDisplay()"
            readonly
            tabindex="-1"
            (focus)="$any($event.target).blur()">
        </mat-form-field>
      </div>
    </form>
  }
} @else {
  <div class="loading-container">
    <mat-spinner [diameter]="40"></mat-spinner>
    <p>Loading journal entry...</p>
  </div>
}
