@if (!isPageReady) {
  <p class="owner-statement-list-loading">Loading owner statement list...</p>
} @else if (isServiceError) {
  <p class="owner-statement-list-error">Unable to load owner statement list.</p>
} @else {
  <div class="mat list-layout-standard owner-statement-layout owner-statement-layout--accrual">
    <div class="owner-statement-context-band property-tab-actions-band dbg-band-actions">
      <div class="property-tab-actions-band__row owner-statement-context-band__row">
        <div class="owner-statement-context-band__titles">
          <p class="owner-statement-report-title">{{ reportTitle }}</p>
          <button type="button" class="owner-statement-context-btn">
            @if (headerEntityLine) {
              <span class="owner-statement-context-btn__entity">{{ headerEntityLine }}</span>
            }
            <span class="owner-statement-context-btn__period">{{ headerPeriodLine }}</span>
          </button>
        </div>
      </div>
    </div>
    <div class="owner-statement-panel dbg-band-main">
      <div class="tableDiv">
        <app-data-table
        tableName="owner-statement-list"
        [data]="lines"
        [columns]="ownerStatementDisplayedColumns"
        [totalsRow]="totalsRow"
        [totalsLabel]="'Totals:'"
        [hasColumnIndex]="true"
        [hasFilter]="true"
        [hasActionsView]="true"
        [hasActionsRowClick]="true"
        [hasActionsStartingBalance]="true"
        [noDataMessage]="noDataMessage"
        [itemsPerPage]="10"
        (rowClickEvent)="onViewStatement($event)"
        (viewEvent)="onViewStatement($event)"
        (startingBalanceEvent)="openStartingBalanceDialog($event)">
        </app-data-table>
      </div>
    </div>
  </div>
}
