<div class="owner-statement-starting-balance-dialog">
  <div class="owner-statement-starting-balance-dialog-header">
    <span class="owner-statement-starting-balance-dialog-title">Enter Starting Balance</span>
    <button mat-mini-fab mat-dialog-close type="button" color="none" class="owner-statement-starting-balance-dialog-close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="owner-statement-starting-balance-dialog-content">
    <form [formGroup]="form" class="owner-statement-starting-balance-dialog-form">
      <mat-form-field appearance="outline">
        <mat-label>Date</mat-label>
        <input matInput [matDatepicker]="startingBalanceDatePicker" formControlName="transactionDate" />
        <mat-datepicker-toggle matIconSuffix [for]="startingBalanceDatePicker"></mat-datepicker-toggle>
        <mat-datepicker #startingBalanceDatePicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Amount</mat-label>
        <input matInput type="text" formControlName="amount" (blur)="onAmountBlur()" />
      </mat-form-field>

      @if (data.requiresAdminPassword) {
        <mat-form-field appearance="outline">
          <mat-label>Confirm Password</mat-label>
          <input matInput type="password" formControlName="currentPassword" autocomplete="current-password" />
          <mat-hint>Required only when changing an existing starting balance.</mat-hint>
        </mat-form-field>
      }
    </form>
  </mat-dialog-content>

  <mat-divider></mat-divider>
  <div class="owner-statement-starting-balance-dialog-actions">
    <button mat-raised-button type="button" color="accent" (click)="onCancel()">Cancel</button>
    <button mat-raised-button type="button" color="primary" (click)="onEnter()">Enter</button>
  </div>
</div>
