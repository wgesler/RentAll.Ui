<div class="rent-roll-wrap">
  @if (!isPageReady) {
    <div class="loading-container">
      <mat-spinner [diameter]="40"></mat-spinner>
      <p>Loading rent roll...</p>
    </div>
  } @else if (isServiceError) {
    <p class="rent-roll-empty">Unable to load rent roll.</p>
  } @else {
    <div class="mat list-layout-standard dbg-band-main">
      <div class="tableDiv">
        <app-data-table
          tableName="accounting-rent-roll"
          [data]="rentRollRowsDisplay"
          [columns]="rentRollDisplayedColumns"
          [noDataMessage]="'No rent roll lines found.'"
          [hasColumnIndex]="true"
          [hasActionsSelect]="true"
          [hasButtonSelectAll]="true"
          [hasFilter]="true"
          [hasToggleTop]="true"
          [buttonToggleTextTop]="'ShowCreated'"
          [hasButtonTop]="true"
          [buttonTextTop]="'Create Bills'"
          [buttonIconTop]="'receipt_long'"
          [buttonColorTop]="'accent'"
          [buttonDisabledTop]="isCreateBillsTopButtonDisabled"
          [hasButtonTopSecondary]="true"
          [buttonTextTopSecondary]="'Add'"
          [buttonIconTopSecondary]="'add'"
          [buttonColorTopSecondary]="'primary'"
          [hasActionsRowClick]="true"
          [hasPropertyCodeLink]="true"
          [hasActionsEdit]="true"
          [hasActionsDelete]="true"
          [hasActionsInvoice]="true"
          [hasActionsInfo]="true"
          [invoiceActionTooltip]="'Create Bill'"
          [invoiceActionColor]="'#FF9800'"
          [infoActionColor]="'#1E88E5'"
          [deleteConfirmTitle]="'Delete Agreement Line'"
          [deleteConfirmMessage]="'Are you sure you want to delete this agreement line?'"
          [totalsRow]="rentRollTotalsRow"
          [itemsPerPage]="100"
          (topToggleButtonEvent)="onToggleShowCreatedBills()"
          (topButtonEvent)="onCreateSelectedBills()"
          (topSecondaryButtonEvent)="onAddAgreementLineFromTop()"
          (selectionSet)="onSelectionSet($event)"
          (checkboxChangeEvent)="onRentRollCheckboxChange($event)"
          (rowClickEvent)="onCreateBill($event)"
          (propertyCodeClickEvent)="onPropertyCodeClick($event)"
          (editEvent)="onEditAgreementLine($event)"
          (deleteEvent)="onDeleteAgreementLine($event)"
          (invoiceEvent)="onCreateBill($event)">
        </app-data-table>
      </div>
    </div>
  }
</div>
