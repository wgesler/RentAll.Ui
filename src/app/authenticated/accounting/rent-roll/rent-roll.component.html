<div class="rent-roll-wrap">
  @if (!isPageReady) {
    <div class="rent-roll-loading">
      <mat-spinner diameter="36"></mat-spinner>
      <p>Loading rent roll...</p>
    </div>
  } @else if (isServiceError) {
    <p class="rent-roll-empty">Unable to load rent roll.</p>
  } @else {
    <div class="mat list-layout-standard dbg-band-main">
      <div class="tableDiv">
        <app-data-table
          tableName="accounting-rent-roll"
          [data]="rentRollRowsDisplay"
          [columns]="rentRollDisplayedColumns"
          [noDataMessage]="'No rent roll lines found.'"
          [hasColumnIndex]="false"
          [hasFilter]="true"
          [hasToggleTop]="false"
          [hasButtonTop]="false"
          [itemsPerPage]="100">
        </app-data-table>
      </div>
    </div>
    @if (hasRentRollRows) {
      <div class="rent-roll-summary">
      <div class="rent-roll-summary-label">Grand Total ({{ daysInMonth }} days)</div>
      <div class="rent-roll-summary-value">{{ getRentRollAmountDisplay(rentRollTotalAmount) }}</div>
      </div>
    }
  }
</div>
