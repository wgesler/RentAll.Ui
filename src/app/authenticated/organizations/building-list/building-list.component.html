@if (isPageReady) {
  <div class="mat list-layout-tabbed">
    <div class="tableDiv">
      <app-data-table
        [data]="buildingsDisplay"
        [columns]="buildingsDisplayedColumns"
        [hasColumnIndex]="true"
        [hasFilter]="true"
        [hasToggleTop]="false"
        [hasActionsRowClick]="true"
        [hasActionsEdit]="true"
        [hasActionsDelete]="true"
        [deleteConfirmTitle]="'Delete Building'"
        [deleteConfirmMessage]="'Are you sure you want to delete this building?'"
        [itemsPerPage]="10"
        (editEvent)="goToBuilding($event)"
        (rowClickEvent)="goToBuilding($event)"
        (deleteEvent)="deleteBuilding($event)">
        <div dataTableFilterActions>
          <div class="table-filter-actions-group form-titlebar-actions-wrap uniform-gap">
            <mat-slide-toggle id="toggle-buildings-inactive" [checked]="showInactive" color="primary" (change)="toggleInactive()" class="whitespace-nowrap">InActive</mat-slide-toggle>
            <button mat-raised-button type="button" color="primary" id="add-button" (click)="addBuilding()" class="whitespace-nowrap items-center flex gap-1">
              <mat-icon class="text-base">add</mat-icon>
              <span>Add</span>
            </button>
          </div>
        </div>
      </app-data-table>
    </div>
  </div>
}
