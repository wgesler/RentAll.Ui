@if (errorMessage) {
  <div class="logs-message logs-message-error">{{ errorMessage }}</div>
}

@if (isLoading) {
  <div class="logs-message">Loading database errors...</div>
} @else {
  <div class="mat list-layout-standard">
    <div class="tableDiv">
      <app-data-table
        tableName="database-error-log-list"
        [data]="rows"
        [columns]="columns"
        [hasColumnIndex]="true"
        [hasFilter]="true"
        [hasActionsRowClick]="true"
        [hasButtonTop]="false"
        [itemsPerPage]="10"
        [noDataMessage]="'No database errors found.'"
        (rowClickEvent)="openDatabaseError($event)">
        <div dataTableFilterActions>
          <div class="table-filter-actions-group form-titlebar-actions-wrap uniform-gap">
            <button mat-raised-button type="button" color="primary" class="text-nowrap flex-shrink-0" (click)="refreshDatabaseErrorLogs()">
              <mat-icon>refresh</mat-icon>
              Refresh
            </button>
            <button mat-raised-button type="button" color="accent" class="text-nowrap flex-shrink-0" [disabled]="isDeleting" (click)="deleteAllDatabaseErrorLogs()">
              <mat-icon>delete_sweep</mat-icon>
              Delete All
            </button>
          </div>
        </div>
      </app-data-table>
    </div>
  </div>
}
