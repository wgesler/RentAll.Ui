@if (isEmbeddedPreviewMode()) {
  <div class="preview-section">
    <iframe #previewFrame class="w9-preview-frame" [attr.srcdoc]="previewIframeSrcDoc"></iframe>
  </div>
} @else if (!isPageReady) {
  <div class="loading-container">
    <mat-spinner [diameter]="40"></mat-spinner>
    <p>Loading W-9 form...</p>
  </div>
} @else {
  <div class="w9-container">
    <form [formGroup]="form" class="w9-form">
      <div class="property-tab-actions-band">
        <div class="property-tab-actions-band__row flex justify-end gap-2 uniform-gap">
          <div class="table-filter-actions-group form-titlebar-actions-wrap uniform-gap">
            <button mat-raised-button type="button" color="accent" (click)="onView()" [disabled]="!editableHtml">
              <mat-icon>visibility</mat-icon>
              View
            </button>
            @if (isViewMode) {
              <button mat-raised-button type="button" color="accent" (click)="onEdit()">
                <mat-icon>edit</mat-icon>
                Edit
              </button>
            }
          </div>
        </div>
      </div>

      @if (isViewMode) {
        <div class="property-tab-actions-band">
          <div class="property-tab-actions-band__row flex justify-end gap-2 uniform-gap">
            <div class="table-filter-actions-group form-titlebar-actions-wrap uniform-gap">
              <button mat-raised-button type="button" color="accent" (click)="onPrint()">
                <mat-icon>print</mat-icon>
                Print
              </button>
              <button mat-raised-button type="button" color="accent" (click)="onEmail()" [disabled]="!ownerContact?.email || !previewIframeHtml">
                <mat-icon>email</mat-icon>
                Email
              </button>
              <button mat-raised-button type="button" color="accent" (click)="onDownload()">
                <mat-icon>download</mat-icon>
                Download
              </button>
              <button mat-raised-button type="button" color="primary" (click)="onSave()" [disabled]="isSaving || !previewIframeHtml">
                <mat-icon>save</mat-icon>
                Save
              </button>
            </div>
          </div>
        </div>
      }

      <div class="property-tab-main-area">
        <div class="include-controls">
          <span class="include-label">Include:</span>
          <mat-checkbox formControlName="includeDocument" class="include-checkbox" (change)="onIncludeChange()">
            W-9 Form
          </mat-checkbox>
        </div>

        <div class="editor-section">
          @if (isViewMode && viewedHtml) {
            <div class="preview-section">
              <div class="view-surface" [innerHTML]="viewedHtml"></div>
            </div>
          } @else if (editableHtml) {
            <div class="preview-section">
              <div class="edit-surface" #editSurface [innerHTML]="editableHtml"></div>
            </div>
          } @else {
            <div class="owner-shell-placeholder">
              <p>Select the W-9 form to preview.</p>
            </div>
          }
        </div>
      </div>
    </form>
  </div>
}
