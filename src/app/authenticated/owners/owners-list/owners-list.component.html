<div class="owners-list-shell dbg-band-main">
  @if (showOwnerLeadForm) {
    <app-owner
      [embeddedInShell]="true"
      [shellLeadId]="ownerLeadFormId"
      [officeId]="officeId()"
      (closed)="onOwnerLeadFormClosed()">
    </app-owner>
  } @else if (showOwnerContactForm) {
    <app-contact
      [id]="ownerContactId"
      [copyFrom]="ownerContactCopyFrom"
      [presetEntityTypeId]="ownerEntityTypeId"
      [ownerLeadId]="null"
      (closed)="onOwnerContactFormClosed()">
    </app-contact>
  } @else {
    <mat-accordion class="owners-list-accordion" multi>
      <mat-expansion-panel [expanded]="true">
        <mat-expansion-panel-header>
          <mat-panel-title>Leads / Owners</mat-panel-title>
        </mat-expansion-panel-header>
        <div class="owners-accordion-body">
          <app-owner-list
            [embeddedInShell]="true"
            [officeId]="officeId()"
            (requestNewOwner)="onAddOwnerLead()"
            (requestEditOwner)="onEditOwnerLead($event)">
          </app-owner-list>
        </div>
      </mat-expansion-panel>

      <mat-expansion-panel [expanded]="true">
        <mat-expansion-panel-header>
          <mat-panel-title>Contacts / Owners</mat-panel-title>
        </mat-expansion-panel-header>
        <div class="owners-accordion-body">
          <app-contact-list
            [entityTypeId]="ownerEntityTypeId"
            [officeId]="officeId()"
            [showInactive]="showInactiveOwnerContacts"
            (showInactiveChange)="onOwnerContactsShowInactiveChange($event)"
            (openContact)="onOpenOwnerContact($event)">
          </app-contact-list>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  }
</div>
