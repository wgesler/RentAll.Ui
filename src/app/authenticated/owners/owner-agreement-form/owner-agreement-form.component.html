@if (!isPageReady) {
  <div class="loading-container">
    <mat-spinner [diameter]="40"></mat-spinner>
    <p>Loading agreement form...</p>
  </div>
} @else {
  <div class="owner-agreement-form-container">
    <form [formGroup]="form" class="owner-agreement-form">
      <div class="property-tab-actions-band">
        <div class="property-tab-actions-band__row flex justify-end gap-2 uniform-gap">
          <div class="table-filter-actions-group form-titlebar-actions-wrap uniform-gap">
            @if (isEditMode) {
              <button mat-raised-button type="button" color="accent" (click)="saveDraft()">
                <mat-icon>save</mat-icon>
                Save Draft
              </button>
              <button mat-raised-button type="button" color="accent" (click)="resetForm()">
                <mat-icon>restart_alt</mat-icon>
                Reset
              </button>
              <button mat-raised-button type="button" color="primary" (click)="viewForm()">
                <mat-icon>visibility</mat-icon>
                View
              </button>
            } @else {
              <button mat-raised-button type="button" color="accent" (click)="editForm()">
                <mat-icon>edit</mat-icon>
                Edit
              </button>
              <button mat-raised-button type="button" color="accent" (click)="onPrint()">
                <mat-icon>print</mat-icon>
                Print
              </button>
              <button mat-raised-button type="button" color="accent" (click)="onEmail()" [disabled]="!ownerContact?.email || !previewIframeHtml">
                <mat-icon>email</mat-icon>
                Email
              </button>
              <button mat-raised-button type="button" color="accent" (click)="onDownload()">
                <mat-icon>download</mat-icon>
                Download
              </button>
              <button mat-raised-button type="button" color="primary" (click)="onSave()" [disabled]="isSaving || !previewIframeHtml">
                <mat-icon>save</mat-icon>
                Save
              </button>
            }
          </div>
        </div>
      </div>

      <div class="property-tab-main-area">
        <div class="include-controls">
          <span class="include-label">Include:</span>
          <mat-checkbox formControlName="includeDocument" class="include-checkbox" (change)="onIncludeChange()">
            {{ includeLabel }}
          </mat-checkbox>
        </div>

        <div class="editor-section">
          @if (isEditMode) {
            <div class="preview-section">
              <iframe [srcdoc]="editableHtml || fallbackIframeHtml" class="preview-iframe" [attr.key]="iframeKey" #editIframe (load)="onEditIframeLoad()" frameborder="0"></iframe>
            </div>
          } @else {
            <div class="preview-section">
              <iframe [srcdoc]="safeHtml || fallbackIframeHtml" class="preview-iframe" [attr.key]="iframeKey" #previewIframe (load)="onPreviewIframeLoad()" frameborder="0"></iframe>
            </div>
          }
        </div>
      </div>
    </form>
  </div>
}
