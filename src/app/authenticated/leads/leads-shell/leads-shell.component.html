<div class="flex content-card-wrap justify-center">
  <section class="content-card">
    <div class="flex justify-between items-center gap-3 rounded-t-lg bg-slate-300 py-0 pl-8 pr-4 property-titlebar dbg-band-actions">
      <div class="flex flex-wrap items-center gap-3 py-4">
        <span class="flex flex-shrink-0 items-center gap-2">
          <mat-icon class="flex-shrink-0">hub</mat-icon>
          <span class="flex-shrink-0 text-xl font-medium">Leads</span>
        </span>
        <div class="header-title form-titlebar-fields-wrap">
          @if (showOfficeDropdown) {
            <app-title-bar-select
              [label]="'Office'"
              [formFieldClass]="'titlebar-field-office'"
              [value]="selectedOfficeId"
              [options]="officeOptions"
              [nullOptionLabel]="'All Offices'"
              [noResultsText]="'No offices match your search'"
              (valueChange)="onOfficeDropdownChange($event)">
            </app-title-bar-select>
          }
        </div>
      </div>
      <div class="form-titlebar-actions-wrap uniform-gap">
        @if (showRentalLeadForm || showOwnerLeadForm) {
          <button
            mat-raised-button
            type="button"
            color="accent"
            class="text-nowrap flex-shrink-0"
            (click)="onEmbeddedLeadFormBack()">
            <mat-icon>arrow_back</mat-icon>
            Back
          </button>
        }
      </div>
    </div>
    <mat-card>
      <mat-tab-group
        [selectedIndex]="selectedTabIndex"
        [animationDuration]="'0ms'"
        class="property-tabs leads-shell-five-slot-tabs dbg-band-tabs"
        (selectedIndexChange)="onTabIndexChange($event)">
        <mat-tab label="Rental">
          <ng-template matTabContent>
            @if (showRentalLeadForm) {
              <app-rental
                [embeddedInShell]="true"
                [shellLeadId]="'new'"
                (closed)="onRentalLeadFormClosed()" />
            } @else {
              <app-rental-list
                [embeddedInShell]="true"
                [officeId]="selectedOfficeId"
                (requestNewRental)="onAddRentalLead()" />
            }
          </ng-template>
        </mat-tab>
        <mat-tab label="Owner">
          <ng-template matTabContent>
            @if (showOwnerLeadForm) {
              <app-owner
                [embeddedInShell]="true"
                [shellLeadId]="'new'"
                (closed)="onOwnerLeadFormClosed()" />
            } @else {
              <app-owner-list
                [embeddedInShell]="true"
                [officeId]="selectedOfficeId"
                (requestNewOwner)="onAddOwnerLead()" />
            }
          </ng-template>
        </mat-tab>
      </mat-tab-group>
    </mat-card>
  </section>
</div>
