<div class="flex content-card-wrap justify-center">
  <section class="content-card">
    <div class="flex justify-between items-center gap-3 rounded-t-lg bg-slate-300 py-0 pl-8 pr-4 property-titlebar dbg-band-actions">
      <div class="flex flex-wrap items-center gap-3 py-4">
        <span class="flex flex-shrink-0 items-center gap-2">
          <mat-icon class="flex-shrink-0">hub</mat-icon>
          <span class="flex-shrink-0 text-xl font-medium">Leads</span>
        </span>
        <div class="header-title form-titlebar-fields-wrap">
          <app-title-bar-select
            [label]="'Office'"
            [formFieldClass]="'titlebar-field-office'"
            [value]="selectedOfficeId"
            [options]="officeOptions"
            [nullOptionLabel]="'All Offices'"
            [noResultsText]="'No offices match your search'"
            [showError]="officeTitleBarShowError"
            [errorText]="'Select a specific office'"
            (valueChange)="onOfficeDropdownChange($event)">
          </app-title-bar-select>
          @if (selectedTabIndex === 3) {
            <mat-form-field appearance="outline" class="titlebar-field-office">
              <mat-label>Start Date</mat-label>
              <input
                matInput
                [matDatepicker]="reportStartPicker"
                [(ngModel)]="reportsStartDate"
                [ngModelOptions]="{ standalone: true }"
                (dateChange)="onReportsDateRangeChange()"
                [max]="reportsEndDate" />
              <mat-datepicker-toggle matIconSuffix [for]="reportStartPicker"></mat-datepicker-toggle>
              <mat-datepicker #reportStartPicker></mat-datepicker>
            </mat-form-field>
            <mat-form-field appearance="outline" class="titlebar-field-office">
              <mat-label>End Date</mat-label>
              <input
                matInput
                [matDatepicker]="reportEndPicker"
                [(ngModel)]="reportsEndDate"
                [ngModelOptions]="{ standalone: true }"
                (dateChange)="onReportsDateRangeChange()"
                [min]="reportsStartDate" />
              <mat-datepicker-toggle matIconSuffix [for]="reportEndPicker"></mat-datepicker-toggle>
              <mat-datepicker #reportEndPicker></mat-datepicker>
            </mat-form-field>
          }
        </div>
      </div>
      <div class="form-titlebar-actions-wrap uniform-gap">
        @if (showRentalLeadForm || showOwnerLeadForm || showGeneralLeadForm) {
          <button
            mat-raised-button
            type="button"
            color="accent"
            class="text-nowrap flex-shrink-0"
            (click)="onEmbeddedLeadFormBack()"
            >
            <mat-icon>arrow_back</mat-icon>
            Back
          </button>
        }
      </div>
    </div>
    <mat-card>
      <mat-tab-group
        [animationDuration]="'0ms'"
        class="property-tabs leads-shell-five-slot-tabs dbg-band-tabs"
        (selectedIndexChange)="onTabIndexChange($event)">
        <mat-tab label="Rental">
          <ng-template matTabContent>
            @if (showRentalLeadForm) {
              <app-rental
                [embeddedInShell]="true"
                [shellLeadId]="rentalShellLeadId"
                [officeId]="selectedOfficeId"
                (closed)="onRentalLeadFormClosed()"
                />
            } @else {
              <app-rental-list
                [embeddedInShell]="true"
                [officeId]="selectedOfficeId"
                (requestNewRental)="onAddRentalLead()"
                (requestEditRental)="onEditRentalLead($event)"
                />
            }
          </ng-template>
        </mat-tab>
        <mat-tab label="Owner">
          <ng-template matTabContent>
            @if (showOwnerLeadForm) {
              <app-owner
                [embeddedInShell]="true"
                [shellLeadId]="ownerShellLeadId"
                [officeId]="selectedOfficeId"
                (closed)="onOwnerLeadFormClosed()"
                />
            } @else {
              <app-owner-list
                [embeddedInShell]="true"
                [officeId]="selectedOfficeId"
                (requestNewOwner)="onAddOwnerLead()"
                (requestEditOwner)="onEditOwnerLead($event)"
                />
            }
          </ng-template>
        </mat-tab>
        <mat-tab label="General">
          <ng-template matTabContent>
            @if (showGeneralLeadForm) {
              <app-general
                [embeddedInShell]="true"
                [shellLeadId]="generalShellLeadId"
                [officeId]="selectedOfficeId"
                (closed)="onGeneralLeadFormClosed()"
                />
            } @else {
              <app-general-list
                [embeddedInShell]="true"
                [officeId]="selectedOfficeId"
                (requestNewGeneral)="onAddGeneralLead()"
                (requestEditGeneral)="onEditGeneralLead($event)"
                />
            }
          </ng-template>
        </mat-tab>
        <mat-tab label="Reports">
          <ng-template matTabContent>
            <app-leads-reports
              [officeId]="selectedOfficeId"
              [startDate]="reportsStartDate"
              [endDate]="reportsEndDate"
              [offices]="offices">
            </app-leads-reports>
          </ng-template>
        </mat-tab>
      </mat-tab-group>
    </mat-card>
  </section>
</div>
