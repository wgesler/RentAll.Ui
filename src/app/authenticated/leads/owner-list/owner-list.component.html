<ng-template #ownerListBody>
  @if (!isPageReady) {
    <div class="loading-container">
      <mat-spinner [diameter]="40"></mat-spinner>
      <p>Loading owner leads…</p>
    </div>
  } @else if (isServiceError) {
    <div class="flex items-center justify-center p-8">
      <div class="text-center">
        <mat-icon class="mb-4 text-6xl text-red-500">error_outline</mat-icon>
        <h3 class="mb-2 text-xl font-semibold">Unable to load owner leads</h3>
        <p class="text-gray-600">There was an error loading owner leads. Please try again.</p>
      </div>
    </div>
  } @else {
    <div class="mat list-layout-standard dbg-band-main">
      <div class="tableDiv">
        <app-data-table
          [data]="ownersDisplay"
          [columns]="ownersDisplayedColumns"
          [hasColumnIndex]="true"
          [hasFilter]="true"
          [hasToggleTop]="false"
          [hasButtonTop]="false"
          [hasActionsRowClick]="true"
          [hasActionsEdit]="true"
          [hasActionsCopy]="isOwnerAdmin"
          [hasActionsLink]="isOwnerAdmin"
          [hasActionsOwner]="isOwnerAdmin"
          [hasActionsDelete]="true"
          [deleteConfirmTitle]="'Delete owner lead'"
          [deleteConfirmMessage]="'Are you sure you want to delete this owner lead?'"
          [itemsPerPage]="10"
          (editEvent)="goToOwnerLead($event)"
          (rowClickEvent)="goToOwnerLead($event)"
          (copyEvent)="copyOwnerFormLink($event)"
          (linkEvent)="copyOwnerFormLink($event)"
          (ownerEvent)="openOwnerFromLead($event)"
          (deleteEvent)="deleteOwner($event)"
          (checkboxChangeEvent)="onOwnerCheckboxChange($event)"
          (dropdownChangeEvent)="onOwnerLeadStateDropdownChange($event)">
          <div dataTableFilterActions>
            <div class="table-filter-actions-group form-titlebar-actions-wrap uniform-gap">
              <mat-slide-toggle id="toggle-owner-leads-inactive" color="primary" [checked]="showInactive" (change)="toggleInactive()" class="whitespace-nowrap">
                InActive
              </mat-slide-toggle>
              <button mat-raised-button type="button" color="primary" id="add-owner-lead-button" class="whitespace-nowrap items-center flex gap-1" (click)="addOwnerLead()">
                <mat-icon class="text-base">add</mat-icon>
                <span>Add</span>
              </button>
            </div>
          </div>
        </app-data-table>
      </div>
    </div>
  }
</ng-template>

<ng-container *ngTemplateOutlet="ownerListBody" />
